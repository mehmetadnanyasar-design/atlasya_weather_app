name: Build Atlasya Weather APK and AAB

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Recreate Flutter Android project
        run: |
          rm -rf android ios linux macos windows web test
          flutter create -t app --project-name atlasya_weather_app .

      - name: Add Android internet permission
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text()

          if '<uses-permission android:name="android.permission.INTERNET"/>' not in s:
              s = s.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\\n    <uses-permission android:name="android.permission.INTERNET"/>'
              )

          if 'android:usesCleartextTraffic="true"' not in s:
              s = s.replace(
                  '<application',
                  '<application\\n        android:usesCleartextTraffic="true"',
                  1
              )

          p.write_text(s)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlasya-weather-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlasya-weather-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
